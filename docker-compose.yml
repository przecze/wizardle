services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./preprocessing:/preprocessing:ro
      - ./fragment_context_cache:/fragment_context_cache
    secrets:
      - openrouter_key
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - localnet
    command: uvicorn main:app --reload --workers 1 --host 0.0.0.0 --port 8000
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - localnet
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    environment:
      DEV_MODE: "true"
      NGINX_ENVSUBST_FILTER: DEV_MODE
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    networks:
      - localnet
    depends_on:
      - backend
      - frontend
    ports:
      - 127.0.0.1:8090:80
    restart: unless-stopped

  # Production: self-contained nginx with built frontend
  site:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    networks:
      - localnet
      - nginx-proxy
    environment:
      VIRTUAL_HOST: wizardle.net
      LETSENCRYPT_HOST: wizardle.net
      DEV_MODE: "false"
      NGINX_ENVSUBST_FILTER: DEV_MODE
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    depends_on:
      - backend
    restart: always
    profiles:
      - production

  # Redirect wizardle.janczechowski.com → wizardle.net (nginx-proxy handles TLS)
  janczechowski-redirect:
    image: nginx:alpine
    volumes:
      - ./nginx/wizardle-redirect.conf:/etc/nginx/conf.d/redirect.conf:ro
    networks:
      - nginx-proxy
    environment:
      VIRTUAL_HOST: wizardle.janczechowski.com
      LETSENCRYPT_HOST: wizardle.janczechowski.com
    restart: always
    profiles:
      - production

  # Frontend tests: docker compose --profile test run --rm tester
  tester:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: test
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vitest.config.ts:/app/vitest.config.ts
      - /app/node_modules
    profiles:
      - test

secrets:
  openrouter_key:
    file: ./openrouter_prod_api_key.txt

networks:
  localnet:
  nginx-proxy:
    external: true
